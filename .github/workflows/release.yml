name: Release

# Triggered by git tags shaped like `<package>-v<version>`, e.g.
#   repox-v0.4.0
#   sts-v0.0.3
#   apr-v0.2.0
#
# Pipeline:
#   1. parse:   reads the package name from the tag prefix (job output).
#   2. release: depends on parse; uses needs.parse.outputs.package to pick
#               the right `pypi-<pkg>` GitHub Environment, runs preflight,
#               builds, and publishes via PyPI Trusted Publishing.
#
# Why two jobs: GitHub evaluates `environment.name` at job-start time,
# BEFORE steps run, so we can't reference `steps.parse.outputs.*` from a
# job-level field. `needs.<other-job>.outputs.*` IS available at job-start.
#
# Setup required (one-time, per package):
#   - Register a Trusted Publisher on PyPI for each project, pointing at
#     this workflow file and the corresponding environment.
#   - Create a GitHub Environment named `pypi-{package}` (e.g. pypi-repox)
#     with the appropriate review gates if you want manual approval.

on:
  push:
    tags:
      - "repox-v*"
      - "sts-v*"
      - "sts-app-v*"
      - "apr-v*"
      - "apr-app-v*"
      - "whychanged-v*"
      - "tokencost-v*"
      - "agtrace-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release from (e.g. repox-v0.4.0)"
        required: true

concurrency:
  # Allow simultaneous releases of different packages, but never two
  # of the same package.
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_COLOR: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  # --------------------------------------------------------------------------
  # parse: turn the git tag (or workflow_dispatch input) into structured
  # job outputs so downstream jobs can pick the right environment + path.
  # --------------------------------------------------------------------------
  parse:
    name: Parse tag
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      package: ${{ steps.parse.outputs.package }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse tag
        id: parse
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ "$TAG" =~ ^(repox|sts|sts-app|apr|apr-app|whychanged|tokencost|agtrace)-v([0-9].*)$ ]]; then
            PKG="${BASH_REMATCH[1]}"
            VER="${BASH_REMATCH[2]}"
          else
            echo "::error::tag $TAG does not match <package>-v<version>"
            exit 1
          fi
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Parsed tag '$TAG' -> package=$PKG version=$VER"

  # --------------------------------------------------------------------------
  # release: gates + build + publish. The dynamic environment name is now
  # derived from `needs.parse.outputs.*`, which IS available at job-start.
  # --------------------------------------------------------------------------
  release:
    name: Release ${{ needs.parse.outputs.package }}@${{ needs.parse.outputs.version }}
    needs: parse
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      # OIDC trusted-publishing token for PyPI.
      id-token: write
      # `gh release` reads this if/when we attach changelog notes.
      contents: read

    environment:
      name: pypi-${{ needs.parse.outputs.package }}
      url: https://pypi.org/project/${{ needs.parse.outputs.package }}/

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Sync workspace
        run: uv sync --all-packages --all-groups

      - name: Pre-flight checks
        run: uv run python scripts/release.py --check --package ${{ needs.parse.outputs.package }}

      - name: Build wheel + sdist
        run: |
          uv build --package ${{ needs.parse.outputs.package }} --out-dir dist/

      - name: Verify build artifacts
        shell: bash
        run: |
          ls -la dist/
          uv run twine check dist/* || true

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Skip-existing prevents re-publishing on accidental re-tag.
          skip-existing: true
