name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Force colored output even when tools detect a non-TTY (CI logs benefit).
  FORCE_COLOR: "1"
  PYTHONUNBUFFERED: "1"
  # uv's resolver is faster and respects pyproject.toml correctly.
  UV_PYTHON_PREFERENCE: only-managed

jobs:

  # --------------------------------------------------------------------------
  # Lint, format, and type-check. Runs once on the fastest matrix.
  # --------------------------------------------------------------------------
  lint:
    name: Lint + format + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Sync workspace
        run: uv sync --all-packages --all-groups

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy

  # --------------------------------------------------------------------------
  # Test matrix: Python 3.11..3.14 across Linux / Windows / macOS.
  # Runs the SAME commands that `scripts/release.py --check` runs locally:
  # per-package pytest with `--no-cov`. Keeping coverage out of the matrix
  # eliminates pytest-cov platform-wheel flakes and ensures CI mirrors local.
  # --------------------------------------------------------------------------
  test:
    name: Test py${{ matrix.python-version }} on ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace
        run: uv sync --all-packages --all-groups --python ${{ matrix.python-version }}

      - name: Run preflight (per-package pytest, ruff, mypy)
        # release.py is the single source of truth for what "READY TO RELEASE"
        # means. `--no-sync` is critical: without it, `uv run` decides to
        # re-resolve and downloads a different Python version (the project
        # default from .python-version), wiping the matrix-specific venv we
        # just synced. release.py itself uses sys.executable internally, so
        # this single outer `uv run` is the only env activation that fires.
        run: uv run --no-sync python scripts/release.py --check

  # --------------------------------------------------------------------------
  # Coverage: runs once on Linux + Python 3.14. Separate from the matrix so
  # pytest-cov surface area can't break the cross-platform test grid.
  # --------------------------------------------------------------------------
  coverage:
    name: Coverage
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Sync workspace
        run: uv sync --all-packages --all-groups

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=src/products \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ubuntu-py3.14
          path: coverage.xml
          if-no-files-found: warn
