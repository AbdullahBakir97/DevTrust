name: Feature request
description: Suggest a new capability or behavioral change.
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Which product?
      options:
        - Repo X-ray
        - Smart Test Selector
        - Agent-PR Reviewer
        - CI Local
        - Dep Upgrade Pilot
        - Agent Trace SDK
        - WhyChanged
        - TokenCost
        - AgentGuard
        - Shared platform / workspace tooling
        - Cross-cutting (multiple products)

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation. Avoid jumping to a solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: |
        Optional. If you have a specific solution in mind, sketch it. We may
        propose alternatives.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to address the problem you ruled out.
