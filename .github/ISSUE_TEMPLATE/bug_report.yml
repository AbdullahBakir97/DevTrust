name: Bug report
description: Something isn't working as documented.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the fields below — partial reports are useful, but the more we can reproduce the issue, the faster we can fix it.

  - type: dropdown
    id: product
    attributes:
      label: Which product?
      options:
        - Repo X-ray
        - Smart Test Selector
        - Agent-PR Reviewer
        - CI Local
        - Dep Upgrade Pilot
        - Agent Trace SDK
        - WhyChanged
        - TokenCost
        - AgentGuard
        - Shared platform / workspace tooling
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `<tool> version` (or commit SHA if running from source).
      placeholder: "repox v0.1.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        A minimal, runnable reproduction. Commands you typed; what you saw vs.
        what you expected.
      placeholder: |
        1. Run `repox build my-repo`
        2. Open `.repox/architecture.md`
        3. Expected X, got Y.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Windows 11 / macOS 15 / Ubuntu 24.04
        - Python: 3.14.2
        - Installed via: uv 0.11.11
    validations:
      required: false
